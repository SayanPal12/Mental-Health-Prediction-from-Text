<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Web Page</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
</head>
<body>
   <div class="container">
    <h1>Write Your Text</h1>

    <form id="textForm", action="", method="post">
      <textarea id="textInput" name="textInput" placeholder="Type at least 100 characters..." required></textarea>
      <button type="submit">Submit</button>
    </form>
    {% if output %}
    <div id="outputSection" class="output-section" >
      <h2>Output:{{output}}</h2>
      <p id="outputText"></p>
    </div>
    {% else %}
    <div id="outputSection" class="output-section" >
      <h2>Output:NONE</h2>
      <p id="outputText"></p>
    </div>
    
    {% endif %}
  </div>
</body>
</html>
